spring:
  application:
    name: civilsupplies-api
  profiles:
    active: ${APP_PROFILE:dev}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/civilsupplies}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 14MB

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  cache:
    type: simple

server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    in.civilsupplies: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:change-me-please-this-is-a-dev-only-secret-change-in-prod}
    issuer: civilsupplies-api
    access-ttl-minutes: 60
    refresh-ttl-minutes: 10080
  storage:
    type: ${STORAGE_TYPE:local}
    local-dir: ${UPLOAD_DIR:./uploads}
    s3-bucket: ${S3_BUCKET:}
    s3-region: ${S3_REGION:ap-south-1}
  notification:
    from: ${MAIL_FROM:bellamsudheer19@gmail.com}
    admin-to: ${ADMIN_NOTIFY_TO:bellamsudheer19@gmail.com}
    contact-phone: ${CONTACT_PHONE:+91 95050 56386}
  ratelimit:
    enquiries-per-hour: 10
    quotes-per-hour: 5
    newsletter-per-hour: 5

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:civilsupplies;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate

server:
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
    include-exception: false
